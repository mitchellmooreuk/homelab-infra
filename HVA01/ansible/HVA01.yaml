---
- name: Configure Proxmox VLAN-Aware Bridge
  hosts: proxmox_nodes
  become: true

  tasks:
    - name: Back up current network interfaces configuration
      ansible.builtin.copy:
        src: /etc/network/interfaces
        dest: /etc/network/interfaces.bak
        remote_src: true
        mode: '0644'

    - name: Deploy VLAN-Aware network interfaces configuration
      ansible.builtin.template:
        src: interfaces.j2
        dest: /etc/network/interfaces
        mode: '0644'
      notify: Apply Network Changes

  handlers:
    - name: Apply Network Changes
      ansible.builtin.command: ifreload -a

- name: Secure Host SSH Configurations
  hosts: proxmox_nodes
  become: true
  tasks:
    - name: Generate ssh key
      ansible.builtin.command:
        cmd: ssh-keygen -t rsa -b 4096 -m PEM -f "~/.ssh/id_rsa_terraform" -N ""
      delegate_to: localhost
      become: false
      args:
        creates: "~/.ssh/id_rsa_terraform"

    - name: Insert key into memory
      ansible.builtin.slurp:
        src: "~/.ssh/id_rsa_terraform.pub"
      delegate_to: localhost
      become: false
      register: terraform_pub_key

    - name: Copy key to proxmox node
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ terraform_pub_key['content'] | b64decode }}"

    - name: Harden SSH config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      with_items:
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
        - { regexp: '^#?KbdInteractiveAuthentication', line: 'KbdInteractiveAuthentication no' }
      notify: Restart SSH Daemon

  handlers:
    - name: Restart SSH Daemon
      ansible.builtin.service:
        name: ssh
        state: restarted  

- name: Generate Proxmox API Token and Vault it in Azure
  hosts: proxmox_nodes
  gather_facts: false

  vars:
    secret_name: "HVA01-api-token"
    token_name: "terraform-api-token"

  tasks:
    - name: Ensure old token is removed to allow rotation
      ansible.builtin.command: pveum user token delete root@pam {{ token_name }}
      failed_when: false # Ignore error if the token didn't exist yet

    - name: Generate the API Token via Proxmox CLI
      ansible.builtin.command: >
        pveum user token add root@pam {{ token_name }} 
        --privsep 0 --output-format json
      register: pve_token_raw
      changed_when: true

    - name: Parse token values into variables
      ansible.builtin.set_fact:
        pve_token_json: "{{ pve_token_raw.stdout | from_json }}"

    - name: Construct the unified Terraform API Token string
      ansible.builtin.set_fact:
        full_token_value: "root@pam!{{ token_name }}={{ pve_token_json.value }}"

    - name: Secure token inside Azure Key Vault using local CLI
      ansible.builtin.shell: >
        az keyvault secret set 
        --vault-name "{{ keyvault_name }}"
        --name "{{ secret_name }}" 
        --value "{{ full_token_value }}"
      delegate_to: localhost

    - name: Clean up terminal outputs
      ansible.builtin.debug:
        msg: "Success! The Proxmox API Token has been safely saved to Azure Key Vault."

- name: Download Ubuntu cloud init image
  hosts: proxmox_nodes
  gather_facts: false

  tasks:
  - name: Download Ubuntu 24.04 Cloud-Init Image to Local Storage
    ansible.builtin.get_url:
      url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
      dest: /var/lib/vz/template/iso/ubuntu-24.04-cloudimage.img
      mode: '0644'
      timeout: 1000